
project:
  name: "IMAGETBADAortaSegmentation"
  task_name: "UNet_${model.name}_${training.epochs}epochs"

training:
  batch_size: 16
  epochs: 5
  learning_rate: 0.0002
  optimizer: "AdamW"
  weight_decay: 0.01
  grad_clip: 1.0

early_stopping:
    enabled: True
    patience: 12
    min_delta: 0.001
    restore_best_weights: true

data:
  original_dir: "/content/drive/MyDrive/segmentation_project/data"
  output: "/content/base_patients"
  test_size: 0.2
  random_state: 42
  image_size: 256
  num_workers: 2

model:
  name: "unet"
  in_channel: 1
  out_channel: 2
  features: [32, 64, 128, 256]
  activation: "relu"
  dropout: 0.2
  batch_norm: true

optimizer:
  name: "adamw"
  learning_rate: ${training.learning_rate}
  weight_decay: ${training.weight_decay}

scheduler:
  name: "reduce_lr_on_plateau"
  mode: "min"

transforms:
  image_size: 256
  augmentation:
    horizontal_flip_p: 0.5
    vertical_flip_p: 0.3
    rotate90_p: 0.5
    affine_p: 0.5
    brightness_contrast_p: 0.3
    noise_p: 0.2

logging:
  use_clearml: true
  save_checkpoints: true
  checkpoint_dir: "checkpoints/"
